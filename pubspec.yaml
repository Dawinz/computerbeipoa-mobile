name: beipoa_mobile
description: Computer Beipoa — shop laptops, desktops, and office equipment.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  provider: ^6.1.2
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo.png
  adaptive_icon_background: '#5100B1'
  adaptive_icon_foreground: assets/logo.png
  remove_alpha_ios: true

flutter_native_splash:
  color: '#5100B1'
  image: assets/logo.png
  android_12:
    color: '#5100B1'
    image: assets/logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/banners/
    - assets/payments/
